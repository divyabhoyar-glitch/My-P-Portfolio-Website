<!DOCTYPE html>
<html lang="en">
<head>
    <title>Contact Me | Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="app.css">
</head>
<body>
    <header class="navbar">
        <div class="logo">Portfolio<span>.</span></div>
        <nav class="nav-links">
            <a href="index.html">Home</a>
            <a href="about.html">About</a>
            <a href="index.html#skills-section">Skills</a>
            <a href="index.html#projects-section">Projects</a>
            <a href="contact.html" class="active">Contact</a> </nav>
    </header>

    <section class="contact-container">
        <div class="contact-box">
            <h2>Let's Work <span>Together</span></h2>
            <p>Koi project hai dimaag me ya bas hello kehna hai? Niche form fill karo, main jaldi hi reply karungi!</p>
            
            <form class="contact-form">
                <div class="input-group">
                    <label for="name">Your Name</label>
                    <input type="text" id="name" placeholder="Enter your name" required>
                </div>
                
                <div class="input-group">
                    <label for="email">Your Email</label>
                    <input type="email" id="email" placeholder="Enter your email" required>
                </div>
                
                <div class="input-group">
                    <label for="message">Your Message</label>
                    <textarea id="message" rows="5" placeholder="Type your message here..." required></textarea>
                </div>
                
                <button type="submit" class="btn-submit">
                    Send Message <i class="fa-solid fa-paper-plane"></i>
                </button>
            </form>
        </div>
    </section>
</body>
</html>
